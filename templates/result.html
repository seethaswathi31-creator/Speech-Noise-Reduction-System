<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Processing Complete</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>✅ Noise Reduction Completed</h1>

    <p>Your audio has been processed successfully.</p>

    <hr>

    <h2>🎵 Original Audio</h2>

    <audio controls>
        <source src="{{ url_for('uploaded_file', filename=original) }}" type="audio/wav">
        Your browser does not support the audio element.
    </audio>

    <br><br>

    <h2>🎧 Processed Audio</h2>

    <audio controls>
        <source src="{{ url_for('output_file', filename=cleaned) }}" type="audio/wav">
        Your browser does not support the audio element.
    </audio>

    <br><br><br>

    <a href="{{ url_for('download', filename=cleaned) }}">
        <button type="button">
            ⬇ Download Clean Audio
        </button>
    </a>

    <br><br>

    <a href="{{ url_for('home') }}">
        <button type="button">
            🔄 Process Another Audio
        </button>
    </a>

</div>

</body>

</html>
