<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Speech Noise Reduction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🎙 Speech Noise Reduction System</h1>

    <p>
        Upload a <strong>.wav</strong> audio file and reduce background noise
        using FFT-based signal processing.
    </p>

    <form action="{{ url_for('upload') }}"
          method="POST"
          enctype="multipart/form-data">

        <input
            type="file"
            name="audio"
            accept=".wav"
            required>

        <br><br>

        <button type="submit">
            Process Audio
        </button>

    </form>

</div>

</body>

</html>
